apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: pleesah-dokumentasjon
  namespace: leesah
spec:
  accessPolicy:
    outbound:
      rules:
        - application: pleesah-havnesjef
          namespace: leesah
  port: 3000
  ingresses:
    - "https://leesah.io/kubernetes"
  resources:
    limits:
      memory: 768Mi
    requests:
      cpu: "10m"
      memory: 128Mi
